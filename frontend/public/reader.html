<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>📖 Оқу — Кітапхана</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
:root{--gold:#C8A96E;--gold-dim:rgba(200,169,110,.15);--gold-border:rgba(200,169,110,.3);--bg:#0D0D0D;--bg2:#111;--bg3:#161616;--cream:#F5F0E8;--cream-dim:rgba(245,240,232,.55)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--cream);min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.5rem;border-bottom:1px solid rgba(255,255,255,.06);position:sticky;top:0;z-index:50;background:rgba(13,13,13,.95);backdrop-filter:blur(10px)}
.back-btn{font-size:13px;color:var(--cream-dim);cursor:pointer;text-decoration:none;border:none;background:none;color:var(--cream-dim)}
.back-btn:hover{color:var(--cream)}
.book-title-top{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.settings-btn{font-size:13px;padding:6px 12px;border:1px solid rgba(255,255,255,.1);border-radius:3px;background:none;color:var(--cream-dim);cursor:pointer}
.read-progress{height:3px;background:rgba(255,255,255,.07);position:sticky;top:57px;z-index:49}
.read-progress-fill{height:100%;background:var(--gold);transition:width .4s ease;width:0%}
.book-header{padding:2rem 1.5rem 1.5rem;border-bottom:1px solid rgba(255,255,255,.06);display:flex;gap:1.5rem}
.book-cover{width:80px;height:110px;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:6px}
.book-cover-txt{font-family:'Playfair Display',serif;font-size:10px;font-weight:600;color:rgba(255,255,255,.85);text-align:center;line-height:1.3}
.book-meta h1{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;margin-bottom:4px;line-height:1.2}
.author{font-size:13px;color:var(--cream-dim);margin-bottom:8px}
.book-tags{display:flex;gap:6px;flex-wrap:wrap}
.btag{font-size:11px;color:var(--gold);background:var(--gold-dim);border:1px solid var(--gold-border);padding:3px 10px;border-radius:10px}
.book-desc{font-size:13px;color:var(--cream-dim);line-height:1.6;margin-top:8px}
.chapters-nav{padding:1rem 1.5rem;border-bottom:1px solid rgba(255,255,255,.06);display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.chapters-nav::-webkit-scrollbar{display:none}
.chap-btn{font-size:12px;white-space:nowrap;padding:5px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.08);background:transparent;color:var(--cream-dim);cursor:pointer;transition:.2s;flex-shrink:0}
.chap-btn.active{background:var(--gold);color:#0D0D0D;border-color:var(--gold)}
.reader{max-width:680px;margin:0 auto;padding:2rem 1.5rem 6rem}
.chapter-num{font-size:12px;color:var(--gold);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.8rem}
.chapter-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;margin-bottom:1.5rem;line-height:1.2}
.divider{width:40px;height:2px;background:var(--gold);margin-bottom:2rem;opacity:.5}
.text-body{font-family:'Lora',serif;font-size:17px;line-height:1.9;color:rgba(245,240,232,.88)}
.text-body p{margin-bottom:1.4rem}
.text-body p:first-child::first-letter{font-size:3.2em;font-weight:700;float:left;line-height:.85;margin-right:8px;margin-top:4px;color:var(--gold);font-family:'Playfair Display',serif}
.bottom-controls{position:fixed;bottom:0;left:0;right:0;background:rgba(13,13,13,.97);border-top:1px solid rgba(255,255,255,.07);padding:.9rem 1.5rem;display:flex;align-items:center;gap:12px}
.nav-btn{padding:8px 20px;border-radius:3px;border:1px solid rgba(255,255,255,.1);background:transparent;color:var(--cream-dim);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:.2s}
.nav-btn:hover{color:var(--cream)}
.nav-btn.primary{background:var(--gold);color:#0D0D0D;border-color:var(--gold)}
.page-info{flex:1;text-align:center;font-size:12px;color:var(--cream-dim)}
.settings-panel{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);align-items:flex-end;justify-content:center}
.settings-panel.open{display:flex}
.settings-card{background:var(--bg2);border:1px solid rgba(255,255,255,.1);border-radius:12px 12px 0 0;width:100%;max-width:480px;padding:1.5rem}
.settings-card h3{font-family:'Playfair Display',serif;font-size:18px;margin-bottom:1.2rem}
.setting-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.setting-lbl{font-size:13px;color:var(--cream-dim)}
.size-btns{display:flex;gap:6px}
.sz-btn{width:34px;height:34px;border-radius:3px;border:1px solid rgba(255,255,255,.1);background:transparent;color:var(--cream-dim);cursor:pointer;font-size:13px}
.sz-btn.active{background:var(--gold);color:#0D0D0D;border-color:var(--gold)}
.theme-btns{display:flex;gap:8px}
.th-btn{width:34px;height:34px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:.2s}
.th-btn.active{border-color:var(--gold)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.reader{animation:fadeUp .4s ease}
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="index.html">← Артқа</a>
  <div class="book-title-top" id="top-title">Жүктелуде...</div>
  <button class="settings-btn" onclick="openSettings()">⚙</button>
</div>
<div class="read-progress"><div class="read-progress-fill" id="prog-fill"></div></div>
<div class="book-header" id="book-header"></div>
<div class="chapters-nav" id="chaps-nav"></div>
<div class="reader" id="reader-area"></div>

<div class="bottom-controls">
  <button class="nav-btn" id="prev-btn" onclick="prevChapter()">← Алдыңғы</button>
  <div class="page-info" id="page-info"></div>
  <button class="nav-btn primary" id="next-btn" onclick="nextChapter()">Келесі →</button>
</div>

<div class="settings-panel" id="settings-panel" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="settings-card">
    <h3>⚙ Оқу параметрлері</h3>
    <div class="setting-row">
      <span class="setting-lbl">Қаріп өлшемі</span>
      <div class="size-btns">
        <button class="sz-btn" onclick="setSize(14,this)">А-</button>
        <button class="sz-btn active" onclick="setSize(17,this)">А</button>
        <button class="sz-btn" onclick="setSize(20,this)">А+</button>
        <button class="sz-btn" onclick="setSize(23,this)">А++</button>
      </div>
    </div>
    <div class="setting-row">
      <span class="setting-lbl">Тема</span>
      <div class="theme-btns">
        <div class="th-btn active" style="background:#0D0D0D" onclick="setTheme('#0D0D0D','#F5F0E8',this)"></div>
        <div class="th-btn" style="background:#1a1209" onclick="setTheme('#1a1209','#E8DFC8',this)"></div>
        <div class="th-btn" style="background:#F5F0E8" onclick="setTheme('#F5F0E8','#1a1a1a',this)"></div>
        <div class="th-btn" style="background:#0a1628" onclick="setTheme('#0a1628','#c8d8f0',this)"></div>
      </div>
    </div>
    <button onclick="document.getElementById('settings-panel').classList.remove('open')" style="width:100%;padding:10px;background:var(--gold);color:#0D0D0D;border:none;border-radius:3px;font-size:14px;cursor:pointer;margin-top:.5rem">Жабу</button>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const bookId = parseInt(params.get("id")||"1");
const API = "http://127.0.0.1:8000/api";
let book = null, currentChapter = 0;

// ════════════════════════════════════════════════════════
// БАРЛЫҚ КІТАПТАР МӘТІНІ
// ════════════════════════════════════════════════════════
const TEXTS = {

  // ── 1. АБАЙ ЖОЛЫ ────────────────────────────────────
  1: [
    { title:"Бірінші тарау — Жайлауда", text:`
<p>Жазда жайлауда жүрген кезде Абай аталарының мекен-жайына жақын маңдағы бір тауға шығып кетті. Ол тауда Абайдың балалық шағынан бері таныс жер, таныс тас, таныс бұта бар еді.</p>
<p>Биіктен қарағанда алыс жерлер де айқын көрінеді. Жасыл жайлау, ағын су, мал жайылып жүрген алқап — бәрі де бір суретке сыйып тұрды. Абай ойға батып, осынау кең даланың сырын түсінуге тырысты.</p>
<p>Балалық шағынан бері сол жер оның жүрегіне жақын болатын. Таудың шыңына шығып, жел соғып тұрғанда, өзін еркін сезінетін. Мұндай сәтте ол өлең жазатын, ойлар шабытпен келетін.</p>
<p>— Осынау даланың кеңдігіндей кең болсын ойым, — деп күбірлеп қойды ол өзіне өзі.</p>
<p>Күн батыс жаққа еңкейіп, алтын сәуле таудың беткейіне шашылды. Абай сол алтын жарықта тау басында жалғыз отырып, алдағы өмір туралы ойға шомды.</p>` },
    { title:"Екінші тарау — Ауыл", text:`
<p>Ертеңіне Абай атасының ауылына қайтты. Жол жүру оған ауыр тиді — жүрегі ауыр ой-санамен толы еді. Ауылда оны анасы Ұлжан мен апасы Зере күтіп отырды.</p>
<p>— Балам, неге мұңайып жүрсің? — деп сұрады Зере, немересінің бетіне мұқият қарап.</p>
<p>Абай үндемеді. Оның ішінде сөз бар, бірақ оны айтуға сөз таппады. Кейде адамның жүрегі сөз таппайтын нәрселермен толады — тек сезім ғана болады, ой ғана болады.</p>
<p>Зере немересін жақсы білетін. Ол Абайдың ішінде от барын, ол оттың бір күні жарқырап шығатынын сезетін. Сондықтан ол тек жымиып қана қойды.</p>
<p>— Жақсы адам болу үшін көп оқу керек, балам, — деді ол ақырында. — Кітаптан да, өмірден де оқу керек. Екеуі де маңызды.</p>` },
    { title:"Үшінші тарау — Медреседе", text:`
<p>Сол жылы Абайды Семей қаласындағы медресеге апарды. Бұл оның өмірінде жаңа бет болды — жаңа орта, жаңа адамдар, жаңа білім.</p>
<p>Медреседе Абай арабша, парсыша оқып үйренді. Шығыс ақындарының шығармаларымен танысты. Фирдауси, Науаи, Хафиз — бұл есімдер оған жаңа дүние ашты.</p>
<p>Бірақ Абайды ең көп қызықтырғаны — адам жаны туралы сұрақтар еді. Адам неге жаратылған? Өмірдің мәні неде? Жақсылық пен жамандық деген не?</p>
<p>Осы сұрақтармен ол ұстаздарына жүгінді. Кейбіреулері жауап берді, кейбіреулері үндемеді. Бірақ Абай ізденуді тоқтатпады.</p>
<p>Кешке жатар алдында ол жарық майшамның жанында отырып, өлең жазатын. Сол өлеңдерде оның жан сыры, ой-арманы жатты.</p>` },
    { title:"Төртінші тарау — Қайту", text:`
<p>Бірнеше жылдан кейін Абай ауылына қайтты. Ол енді бала емес, жігіт болып қайтты. Бірақ ауыл да өзгерген еді.</p>
<p>Атасы Өскенбай қартайған, ауру. Әкесі Құнанбай ел билігінде. Туыстар арасында дау-жанжал көбейген. Абай мұның бәрін көрді, бәрін сезді.</p>
<p>— Білімнің жоғы — өлім, — деді ол бір күні туыстарына. — Адам білімсіз өмір сүрсе, мал мен адамның айырмасы не?</p>
<p>Бұл сөздер кейбіреулерге ұнамады. Бірақ Абай тоқтамады. Оның айтары көп болатын, халқына берері мол болатын.</p>
<p>Дала желі сол күні де соқты. Абай сол желде өзінің жолын, өзінің тағдырын сезді — ол халқына қызмет ету жолы еді.</p>` },
    { title:"Бесінші тарау — Өлең", text:`
<p>Абайдың өлеңдері ауылдан ауылға тарала бастады. Адамдар оның сөздерін жатқа айтып жүрді. Бірақ Абайдың өзі бұл мақтаннан аулақ еді.</p>
<p>— Өлеңді мақтан үшін жазбаймын, — дейтін ол. — Жүрегімнен шыққанды жазамын. Халқымның жанын ояту үшін жазамын.</p>
<p>Оның өлеңдерінде табиғат суреттері, адам жанының тереңдігі, өмір мен өлім туралы ой болатын. Тілі жатық, бейнелі, нақышты болатын.</p>
<p>Жас буын оның өлеңдерінен рухтанды. Сөздің күші бар екенін, білімнің құны бар екенін түсінді.</p>
<p>Абай сол күндері ең бақытты еді — өйткені ол халқына пайдалы болып жатқанын сезді. Тауда жалғыз отырып армандаған арманы іске аса бастаған еді.</p>` }
  ],

  // ── 2. БОТАГӨЗ ──────────────────────────────────────
  2: [
    { title:"Бірінші тарау — Дала бораны", text:`
<p>Қыс. Дала бораны. Жел ысқырып, қар бұрқасынды. Мұндай күні жолаушы жол жүрмес, ит үрмес, құс ұшпас еді. Бірақ Ботагөз жолда еді.</p>
<p>Ол жас қыз болатын — он жеті жастағы, өңі ашық, көзі от шашқан. Бораннан қорықпайтын, қиыншылықтан шайқалмайтын. Мұны оның анасы да, ауыл адамдары да білетін.</p>
<p>— Ботагөз, тоқта! Боран күшейді! — деп шақырды артындағы жігіт.</p>
<p>Ботагөз артына бұрылып қарамады. Алда оны күтіп тұрған іс бар еді — маңызды, шұғыл іс. Ол іс туралы тек өзі ғана білетін.</p>
<p>Қар аяқтың астында шырылдап, жел бетке соғып тұрды. Бірақ Ботагөз алға жүре берді — мақсатты, бекем қадаммен.</p>` },
    { title:"Екінші тарау — Кездесу", text:`
<p>Ауылға жеткенде күн кешке ауып қалған еді. Ботагөз бір үйдің есігін қақты. Іштен дауыс шықты — ересек ер адамның дауысы.</p>
<p>— Кім бар?</p>
<p>— Мен... Ботагөз. Байтоқтың қызы.</p>
<p>Есік ашылды. Алдында отыз жас шамасындағы жігіт тұрды. Оның көздері ақылды, беті батыл еді. Ол Ботагөзді таниды — бірақ таңырқай қарады.</p>
<p>— Мұндай бораннан жалғыз ба келдің? — деді ол.</p>
<p>— Жалғыз, — деді Ботагөз қысқа. — Сізге хат бар. Маңызды хат.</p>
<p>Жігіт хатты алып, оқыды. Оның беті өзгерді — алдымен бозарды, содан кейін қызарды. Ол Ботагөзге қарады.</p>
<p>— Ертең жол боласың ба? — деді ол.</p>
<p>— Болам, — деді Ботагөз. — Сіз айтқан жерге барам.</p>` },
    { title:"Үшінші тарау — Күрес", text:`
<p>Азамат соғысының жылдары еді. Дала тыныш болмады — ат дүбірі басылмады, мылтық даусы тынбады. Адамдар екіге бөлінді: кімі кімнің жағында екенін білу қиын болды.</p>
<p>Ботагөз өз жағын таңдаған еді. Ол халық жағында еді — кедей, қарапайым халық жағында. Оның әкесі де сол жолда еді, ағалары да.</p>
<p>— Қыз бала бұл істерге неге араласады? — деп сұрайтындар болды.</p>
<p>— Қыз бала да адам, — деп жауап беретін Ботагөз. — Адамның тағдыры ортақ.</p>
<p>Оның батылдығы, тапқырлығы, адамдарға деген сүйіспеншілігі — осылар оны ерекше етті. Ол жай қыз емес, халқының қызы еді.</p>` },
    { title:"Төртінші тарау — Махаббат", text:`
<p>Соғыс жылдарында да махаббат болды. Ботагөз мұны өз жүрегінен сезді — күтпеген жерде, күтпеген уақытта.</p>
<p>Ол жігіт қарапайым еді — биік бойлы, үнсіз, байсалды. Сөзі аз болатын, бірақ сол аз сөзінде мән болатын.</p>
<p>— Сен неге үнемі мұңайып жүресің? — деп сұрады Ботагөз бір күні.</p>
<p>Жігіт ұзақ үндемеді. Содан кейін алысқа қарап:</p>
<p>— Соғыс бітсе, тыныш өмір болса, — деді ол, — мен саған бірдеңе айтар едім.</p>
<p>Ботагөздің жүрегі дүрсілдеді. Сол сәт оның есінде мәңгі қалды.</p>` },
    { title:"Бесінші тарау — Жаңа таң", text:`

  3: [
    { title:"Бірінші тарау — Арал", text:`
<p>Арал теңізі. Мөлдір суы, самалы, балықшылары... Осы жерде ғасырлар бойы халық өмір сүрді, балық аулады, балаларын өсірді.</p>

    { title:"Екінші тарау — Дауыл", text:`

function renderHeader() {
  document.getElementById("top-title").textContent = book.title;
  document.getElementById("book-header").innerHTML = `
    <div class="book-cover" style="background:${book.cover_color||'#3A2010'}">
      <div class="book-cover-txt">${book.title}</div>
    </div>
    <div class="book-meta">
      <h1>${book.title}</h1>
      <div class="author">${book.author}</div>
      <div class="book-tags">
        <span class="btag">${book.genre}</span>
        <span class="btag">★ ${book.rating}</span>
        <span class="btag">${book.pages} бет</span>
      </div>
      <div class="book-desc">${book.description||""}</div>
    </div>`;
}

function renderChapters(chapters) {
  document.getElementById("chaps-nav").innerHTML = chapters.map((c,i)=>
    `<button class="chap-btn${i===0?' active':''}" onclick="loadChapter(${i})">${i+1}-тарау</button>`
  ).join("");
}

function loadChapter(idx, chaptersArg) {
  const chapters = chaptersArg || getChapters(book.id);
  currentChapter = idx;
  document.querySelectorAll(".chap-btn").forEach((b,i)=>b.classList.toggle("active",i===idx));
  const ch = chapters[idx];
  document.getElementById("reader-area").innerHTML = `
    <div class="chapter-num">Тарау ${idx+1} / ${chapters.length}</div>
    <h2 class="chapter-title">${ch.title}</h2>
    <div class="divider"></div>
    <div class="text-body" id="text-body">${ch.text}</div>`;
  document.getElementById("page-info").textContent = `${idx+1} / ${chapters.length} тарау`;
  const pct = Math.round(((idx+1)/chapters.length)*100);
  document.getElementById("prog-fill").style.width = pct+"%";
  document.getElementById("prev-btn").style.opacity = idx===0?"0.3":"1";
  document.getElementById("next-btn").textContent = idx===chapters.length-1?"✓ Аяқталды":"Келесі →";
  window.scrollTo({top:0,behavior:"smooth"});
}

function prevChapter(){if(currentChapter>0)loadChapter(currentChapter-1);}
function nextChapter(){
  const ch=getChapters(book.id);
  if(currentChapter<ch.length-1)loadChapter(currentChapter+1);
  else{document.getElementById("prog-fill").style.width="100%";alert("🎉 Кітап аяқталды! Құттықтаймыз!");}
}
function openSettings(){document.getElementById("settings-panel").classList.add("open");}

  const tb=document.getElementById("text-body");
  if(tb)tb.style.fontSize=px+"px";
  document.querySelectorAll(".sz-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
}
function setTheme(bg,cream,el){
  document.documentElement.style.setProperty("--bg",bg);
  document.documentElement.style.setProperty("--bg2",bg);
  document.documentElement.style.setProperty("--cream",cream);
  document.body.style.background=bg;
  document.querySelectorAll(".th-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
}
window.addEventListener("scroll",()=>{
  const ch=getChapters(book?book.id:1);
  const s=window.scrollY,t=document.body.scrollHeight-window.innerHeight;
  const base=(currentChapter/ch.length)*100,size=(1/ch.length)*100;
  const w=t>0?(s/t)*size:0;
  document.getElementById("prog-fill").style.width=Math.min(base+w,100)+"%";
});

loadBook();
</script>
